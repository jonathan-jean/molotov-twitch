<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>Molotov - Twitch</title>

        <script src="https://cdn.tailwindcss.com"></script>

    </head>
    <body class="antialiased">
        <div class="grid grid-cols-3 min-h-screen bg-gray-100 dark:bg-gray-900 py-4 sm:pt-0 h-full w-full">
            <div class="col-span-2">
                <iframe src="https://app.molotov.tv/" class="w-full h-full" frameborder="0"></iframe>
            </div>
            <div>
                <div id="twitch-embed" class="w-full h-full"></div>
            </div>
        </div>
    </body>


    <!-- Load the Twitch embed JavaScript file -->
    <script src="https://embed.twitch.tv/embed/v1.js"></script>

    <!-- Create a Twitch.Embed object that will render within the "twitch-embed" element -->
    <script type="text/javascript">
      new Twitch.Embed("twitch-embed", {
        width: "100%",
        height: "100%",
        channel: "samueletienne",
      });
    </script>
</html>
